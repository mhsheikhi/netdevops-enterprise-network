---
- name: Scenario 3 - Provision VLANs
  hosts: core_switches, access_switches
  gather_facts: false

  vars:
    my_vlans:
      - { id: 10, name: mgmt }
      - { id: 40, name: edu }
      - { id: 50, name: tech }
      - { id: 99, name: native }
      - { id: 71, name: Test }

  tasks:
    - name: Set VTP Mode to Transparent
      ios_config:
        lines:
          - vtp mode transparent

    - name: Create and Name VLANs
      ios_config:
        parents: vlan {{ item.id }}
        lines:
          - name {{ item.name }}
      loop: "{{ my_vlans }}"

    - name: Save Config
      ios_config:
        save_when: modified
